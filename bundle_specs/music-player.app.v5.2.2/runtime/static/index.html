<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0b0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Music Player</title>
<link rel="manifest" href="/static/manifest.webmanifest">
<style>
:root{--bg:#0b0b0f;--panel:#111317;--panel2:#191c22;--line:#262b34;--text:#f5f7fb;--muted:#9aa3b2;--accent:#a78bfa;--accent2:#60a5fa;--sidebar:250px;--player:98px;--radius:18px}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:radial-gradient(circle at top,#07131b 0%,#05070a 24%,#05070a 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;overflow:hidden}
button,input{font:inherit;color:inherit}button{cursor:pointer;border:0;background:none}input{outline:none}
.app{height:100dvh;display:grid;grid-template-columns:var(--sidebar) 1fr;grid-template-rows:1fr var(--player)}
.sidebar{grid-row:1 / span 2;border-right:1px solid #171a20;background:#090b0f;padding:16px 12px 12px;display:flex;flex-direction:column;gap:14px;min-height:0}
.brand{font-size:28px;font-weight:900;line-height:1.02;padding:2px 8px 0}.brandSub{padding:0 8px;color:var(--muted);font-size:13px}
.searchBox{height:42px;border-radius:999px;border:1px solid #2a2f39;background:#10131a;padding:0 14px;color:#fff;width:100%}
.quickTabs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.chip{padding:12px 10px;border-radius:999px;background:#181c24;border:1px solid #2a3040;font-weight:800;text-align:center}.chip.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat{background:#0d1119;border:1px solid #242a35;border-radius:16px;padding:14px 12px}.stat b{display:block;font-size:18px}.stat span{color:var(--muted);font-size:13px}
.nav{display:grid;gap:6px}.navBtn{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:14px;font-weight:800}.navBtn.active,.navBtn:hover{background:#1b1f28}.sideSec{min-height:0;display:flex;flex-direction:column;gap:8px}.sideLabel{font-size:11px;letter-spacing:.08em;color:var(--muted);padding:0 8px;text-transform:uppercase}.sideScroll{min-height:0;overflow:auto;display:grid;gap:6px;padding-right:4px}.sideItem{padding:12px 14px;border-radius:14px;background:#10141c;border:1px solid #212735;text-align:left}.sideItem.active,.sideItem:hover{background:#17324a;border-color:#2d87bf}.sideItem small{display:block;color:var(--muted)}
.main{min-width:0;display:grid;grid-template-rows:64px 1fr;overflow:hidden}.topbar{display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:12px;align-items:center;padding:10px 16px;border-bottom:1px solid #171a20;background:rgba(7,9,12,.92)}.menuBtn{display:none;width:42px;height:42px;border-radius:50%;background:#171b22;font-size:22px}.searchWrap{display:flex;align-items:center;gap:12px;min-width:0}.search{width:min(100%,420px);height:42px;border-radius:14px;border:1px solid #29303d;background:#10131a;padding:0 14px;color:#fff}.actions{display:flex;gap:10px;align-items:center;overflow:auto}.pill{padding:11px 14px;border-radius:14px;background:#1b1f28;border:1px solid #2d3442;font-weight:800;white-space:nowrap}.pill.toggle.on{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent}
.content{overflow:auto;padding:18px 18px calc(18px + env(safe-area-inset-bottom));display:grid;grid-template-rows:auto auto 1fr;gap:16px;min-height:0}.hero{display:grid;grid-template-columns:72px 1fr auto;gap:14px;align-items:center;padding:14px 16px;border-radius:24px;background:linear-gradient(135deg,#34265f,#18344f);border:1px solid #31537a}.heroCover{width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,#7c3aed,#38bdf8);display:grid;place-items:center;font-size:34px;font-weight:900}.heroMeta h1{margin:0;font-size:18px;line-height:1.05}.heroMeta .sub{color:#d7dfef;margin-top:4px;font-size:14px}.heroActions{display:flex;gap:10px;flex-wrap:wrap}
.sectionHead{display:flex;justify-content:space-between;align-items:end;gap:12px}.sectionHead h2{margin:0;font-size:24px}.sectionHead .sub{color:var(--muted);font-size:14px}.viewActions{display:flex;gap:10px;flex-wrap:wrap}.smallBtn{padding:10px 12px;border-radius:12px;background:#1a1f28;border:1px solid #2a3140;font-weight:800}
.homeGrid{display:grid;gap:20px}.cardGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:18px}.card{display:grid;gap:10px;cursor:pointer}.cover{aspect-ratio:1;border-radius:18px;background:linear-gradient(135deg,#1d2231,#232944);border:1px solid #28304a;display:grid;place-items:center;font-size:42px;font-weight:900}.cardTitle{font-weight:800;font-size:15px;line-height:1.2}.cardMeta{font-size:13px;color:var(--muted);line-height:1.25}
.listWrap{background:#0d1016;border:1px solid #191f29;border-radius:20px;display:grid;grid-template-rows:auto minmax(0,1fr);min-height:360px;max-height:100%}.listHead,.row{display:grid;grid-template-columns:34px 52px minmax(0,1fr) 68px 42px;gap:14px;align-items:center;padding:10px 14px}.listHead{font-size:12px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;border-bottom:1px solid #181d27;background:#11141b}.rows{overflow:auto}.row{border-bottom:1px solid #151a22;cursor:pointer}.row:hover,.row.active{background:#151b25}.cb{width:20px;height:20px}.thumb{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#38bdf8);display:grid;place-items:center;font-weight:900}.title{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{color:var(--muted);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.dur{font-size:12px;color:#efe9ff;background:#2a1656;border-radius:999px;text-align:center;padding:8px 9px}.more{width:38px;height:38px;border-radius:50%;background:#191d26;font-size:19px;display:grid;place-items:center}.empty{display:grid;place-items:center;height:100%;color:var(--muted);padding:30px;text-align:center}
.player{grid-column:1 / -1;display:grid;grid-template-columns:260px minmax(0,1fr) 250px;gap:14px;align-items:center;padding:12px 16px calc(12px + env(safe-area-inset-bottom));border-top:1px solid #1c212c;background:#14171d}.pm{display:flex;gap:12px;align-items:center;min-width:0}.pcover{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#38bdf8);display:grid;place-items:center;font-weight:900}.ptitle{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.psub{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pc{display:grid;gap:8px}.transport{display:flex;justify-content:center;align-items:center;gap:14px}.tbtn{width:38px;height:38px;border-radius:50%;background:#1c212b;display:grid;place-items:center}.tbtn.play{width:50px;height:50px;background:#fff;color:#000}.progress{display:grid;grid-template-columns:48px minmax(0,1fr) 48px;gap:10px;align-items:center}.time{font-size:12px;color:#d6deec;text-align:center}.slider{width:100%;accent-color:#fff}.pr{display:grid;grid-template-columns:auto minmax(0,1fr) auto auto auto;gap:10px;align-items:center}.small{font-size:13px;color:var(--muted)}
.menu{position:fixed;z-index:70;display:none;min-width:220px;background:#151921;border:1px solid #2a3140;border-radius:16px;padding:8px;box-shadow:0 20px 50px rgba(0,0,0,.45)}.menu.open{display:block}.menu button{width:100%;text-align:left;padding:12px 14px;border-radius:10px;font-weight:700}.menu button:hover{background:#232834}
.drawerBack{display:none;position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.55)}.drawerBack.open{display:block}.drawer{position:fixed;top:0;left:0;bottom:0;width:min(86vw,340px);z-index:81;background:#0b0e14;border-right:1px solid #232935;transform:translateX(-100%);transition:.22s;display:flex;flex-direction:column;gap:12px;padding:14px 12px calc(14px + env(safe-area-inset-bottom));overflow:auto}.drawer.open{transform:none}.drawerTop{display:flex;justify-content:space-between;align-items:center}.close{width:42px;height:42px;border-radius:50%;background:#171b22;font-size:26px}
@media (max-width: 900px){:root{--sidebar:0px;--player:112px}.app{grid-template-columns:1fr}.sidebar{display:none}.menuBtn{display:grid;place-items:center}.topbar{grid-template-columns:auto minmax(0,1fr) auto}.actions{gap:8px}.actions .hide-mobile{display:none}.content{padding:12px 12px calc(12px + env(safe-area-inset-bottom));gap:12px}.hero{grid-template-columns:56px 1fr;grid-template-areas:'cover meta' 'actions actions';padding:12px}.heroCover{width:56px;height:56px;border-radius:16px;font-size:28px}.heroActions{grid-area:actions}.heroMeta h1{font-size:16px}.sectionHead h2{font-size:20px}.viewActions{flex-wrap:wrap}.listWrap{min-height:260px}.player{grid-template-columns:1fr;gap:10px;padding:10px 12px calc(10px + env(safe-area-inset-bottom))}.pm{order:1}.pc{order:2}.pr{order:3;grid-template-columns:auto minmax(0,1fr) auto auto}.mobileHide{display:none}.cardGrid{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.row,.listHead{grid-template-columns:28px 44px minmax(0,1fr) 60px 40px;gap:10px;padding:9px 10px}.thumb{width:34px;height:34px;border-radius:10px}.title{font-size:14px}.meta{font-size:12px}.dur{padding:7px 8px;font-size:11px}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">Music Player</div>
    <div class="brandSub">/mnt/nas/media/music</div>
    <input id="sideSearch" class="searchBox" placeholder="Search songs, albums, artists">
    <div class="nav">
      <button class="navBtn active" data-nav="home">🏠 Home</button>
      <button class="navBtn" data-nav="songs">🎵 Songs</button>
      <button class="navBtn" data-nav="artists">🎤 Artists</button>
      <button class="navBtn" data-nav="playlists">📚 Playlists</button>
      <button class="navBtn" data-nav="library">🗂 Library</button>
    </div>
    <button id="newPlaylistSide" class="pill">+ New playlist</button>
    <div class="sideSec"><div class="sideLabel" id="sideLabel">Artists</div><div id="sideScroll" class="sideScroll"></div></div>
  </aside>
  <main class="main">
    <div class="topbar">
      <button id="openDrawer" class="menuBtn">☰</button>
      <div class="searchWrap"><input id="search" class="search" placeholder="Search songs, albums, artists"></div>
      <div class="actions">
        <button id="rescanBtn" class="pill">Rescan</button>
        <button id="smartBtn" class="pill">Smart artist playlists</button>
        <button id="saveQueueBtn" class="pill hide-mobile">Save queue</button>
      </div>
    </div>
    <div id="content" class="content"></div>
  </main>
  <footer class="player">
    <div class="pm"><div id="pcover" class="pcover">♪</div><div style="min-width:0"><div id="ptitle" class="ptitle">Nothing playing</div><div id="psub" class="psub">Choose a song to start playback</div></div></div>
    <div class="pc"><div class="transport"><button id="shuffleBtn" class="pill toggle">Shuffle Off</button><button id="repeatBtn" class="pill toggle">Repeat Off</button><button id="prevBtn" class="tbtn">⏮</button><button id="playBtn" class="tbtn play">▶</button><button id="nextBtn" class="tbtn">⏭</button></div><div class="progress"><div id="ctime" class="time">0:00</div><input id="seek" class="slider" type="range" min="0" max="100" value="0"><div id="ttime" class="time">0:00</div></div></div>
    <div class="pr"><div class="small">Vol</div><input id="vol" class="slider" type="range" min="0" max="1" step="0.01" value="1"><button id="clearQueueBtn" class="pill mobileHide">Clear queue</button><button id="muteBtn" class="pill">Mute</button><button id="saveQueueBtn2" class="pill mobileHide">Save queue</button></div>
  </footer>
</div>
<div id="drawerBack" class="drawerBack"></div>
<aside id="drawer" class="drawer"><div class="drawerTop"><div style="font-size:24px;font-weight:900">Music Player</div><button id="closeDrawer" class="close">×</button></div><div class="brandSub">/mnt/nas/media/music</div><input id="drawerSearch" class="searchBox" placeholder="Search songs, albums, artists"><div class="nav"><button class="navBtn active" data-dnav="home">🏠 Home</button><button class="navBtn" data-dnav="songs">🎵 Songs</button><button class="navBtn" data-dnav="artists">🎤 Artists</button><button class="navBtn" data-dnav="playlists">📚 Playlists</button><button class="navBtn" data-dnav="library">🗂 Library</button></div><button id="newPlaylistDrawer" class="pill">+ New playlist</button><div class="sideSec"><div class="sideLabel" id="drawerSideLabel">Artists</div><div id="drawerSideScroll" class="sideScroll"></div></div></aside>
<div id="menu" class="menu"><button data-action="playnext">Play next</button><button data-action="addqueue">Add to queue</button><button data-action="addplaylist">Add to playlist</button><button data-action="newplaylist">New playlist from song</button><button data-action="speed">Toggle speed dial</button></div>
<audio id="audio" preload="metadata" playsinline></audio>
<script>
const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
const A={audio:$('#audio'),content:$('#content'),search:$('#search'),sideSearch:$('#sideSearch'),drawerSearch:$('#drawerSearch'),seek:$('#seek'),vol:$('#vol')};
const S={tracks:[],playlists:[],artistPlaylists:[],stats:{},nav:'home',selected:'',query:'',cur:null,queue:[],sourceList:[],qi:0,shuffle:false,repeat:'off',menuId:null,speedDials:JSON.parse(localStorage.getItem('music_player_speed_dials')||'[]')};
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const fmt=s=>{const n=Number(s)||0; const m=Math.floor(n/60), sec=Math.floor(n%60); return `${m}:${String(sec).padStart(2,'0')}`};
const api=(u,o={})=>fetch(u,{headers:{'Content-Type':'application/json'},...o}).then(async r=>{if(!r.ok) throw new Error(await r.text()); return r.json()});
const titleLetter=t=>(t?.title||'♪').trim().charAt(0).toUpperCase()||'♪';
function sideItems(){ if(S.nav==='artists') return S.artistPlaylists.map(x=>({name:x.name,count:x.count||x.tracks.length,type:'artist'})); if(S.nav==='playlists') return S.playlists.map(x=>({name:x.name,count:x.count||x.tracks.length,type:'playlist'})); if(S.nav==='songs'||S.nav==='library'){const map=new Map(); S.tracks.forEach(t=>{const f=t.folder||'/'; map.set(f,(map.get(f)||0)+1)}); return [...map.entries()].sort((a,b)=>a[0].localeCompare(b[0])).map(([name,count])=>({name,count,type:'folder'})); } return S.artistPlaylists.map(x=>({name:x.name,count:x.count||x.tracks.length,type:'artist'})); }
function renderSide(){ const label=S.nav==='playlists'?'Playlists':S.nav==='songs'||S.nav==='library'?'Folders':'Artists'; $('#sideLabel').textContent=label; $('#drawerSideLabel').textContent=label; const q=(A.sideSearch.value||A.drawerSearch.value||'').toLowerCase(); const items=sideItems().filter(i=>`${i.name}`.toLowerCase().includes(q)); const html=items.map(i=>`<button class="sideItem ${S.selected===i.name?'active':''}" data-pick="${esc(i.name)}"><span>${esc(i.name)}<small>${i.count} tracks</small></span></button>`).join('')||'<div class="empty">No items yet.</div>'; $('#sideScroll').innerHTML=html; $('#drawerSideScroll').innerHTML=html; }
function filtered(){ let arr=[...S.tracks]; if(S.nav==='artists'&&S.selected){ const p=S.artistPlaylists.find(x=>x.name===S.selected); const set=new Set((p?.tracks)||[]); arr=arr.filter(t=>set.has(t.id)); } else if(S.nav==='playlists'&&S.selected){ const p=S.playlists.find(x=>x.name===S.selected); const set=new Set((p?.tracks)||[]); arr=arr.filter(t=>set.has(t.id)); } else if((S.nav==='songs'||S.nav==='library')&&S.selected){ arr=arr.filter(t=>(t.folder||'/')===S.selected); }
 const q=S.query.toLowerCase().trim(); if(q) arr=arr.filter(t=>`${t.title} ${t.artist} ${t.album} ${t.folder}`.toLowerCase().includes(q)); return arr; }
function cards(items,kind){ return `<div class="cardGrid">${items.map(i=>`<div class="card" data-open="${esc(i.name)}" data-kind="${kind}"><div class="cover">${esc((i.name||'A')[0].toUpperCase())}</div><div class="cardTitle">${esc(i.name)}</div><div class="cardMeta">${i.count||0} tracks</div></div>`).join('')}</div>`; }
function row(t){ return `<div class="row ${S.cur?.id===t.id?'active':''}" data-play="${t.id}"><input class="cb" data-stop="1" type="checkbox"><div class="thumb">${esc(titleLetter(t))}</div><div><div class="title">${esc(t.title)}</div><div class="meta">${esc(t.artist)} • ${esc(t.album)} • ${esc(t.folder||'/')}</div></div><div class="dur">${fmt(t.duration)}</div><button class="more" data-stop="1" data-menu="${t.id}">⋯</button></div>`; }
function listSection(title,arr,showActions=true){ return `<section class="section"><div class="sectionHead"><div><h2>${esc(title)}</h2><div class="sub">${arr.length} visible tracks</div></div>${showActions?`<div class="viewActions"><button class="smallBtn" data-shuffleall="1">Shuffle all</button><button class="smallBtn" data-addall="1">Add all to queue</button><button class="smallBtn" data-nextall="1">Play next</button></div>`:''}</div><div class="listWrap"><div class="listHead"><div></div><div></div><div>Title</div><div>Duration</div><div></div></div><div class="rows">${arr.length?arr.map(row).join(''):`<div class="empty">No tracks found.</div>`}</div></div></section>`; }
function homeView(){ const picks=S.tracks.slice(0,8).map(t=>({name:t.title,meta:t.artist,id:t.id})); const speed=S.speedDials.map(id=>S.tracks.find(t=>t.id===id)).filter(Boolean); return `<div class="section"><div class="sectionHead"><div><div class="eyebrow">Offline local library</div><h2 style="font-size:40px;margin:0">Home</h2></div><div class="sub">${S.stats.track_count||0} tracks</div></div></div><div class="homeGrid">${speed.length?`<section class="section"><div class="sectionHead"><h2>Speed dials</h2><div class="sub">Pinned for one-tap play</div></div><div class="cardGrid">${speed.map(t=>`<div class="card" data-playcard="${t.id}"><div class="cover">${esc(titleLetter(t))}</div><div class="cardTitle">${esc(t.title)}</div><div class="cardMeta">${esc(t.artist)}</div></div>`).join('')}</div></section>`:''}<section class="section"><div class="sectionHead"><h2>Quick picks</h2><div class="sub">Tap any card to play</div></div><div class="cardGrid">${picks.map(t=>`<div class="card" data-playcard="${t.id}"><div class="cover">${esc(titleLetter(t))}</div><div class="cardTitle">${esc(t.name)}</div><div class="cardMeta">${esc(t.meta||'')}</div></div>`).join('')}</div></section><section class="section"><div class="sectionHead"><h2>Artist playlists</h2><div class="sub">Generated from tags and filenames</div></div>${cards(S.artistPlaylists.slice(0,12),'artists')}</section><section class="section"><div class="sectionHead"><h2>Your playlists</h2><div class="sub">Saved playlists</div></div>${cards(S.playlists.slice(0,12),'playlists')}</section></div>`; }
function updatePlayer(){ $('#pcover').textContent=S.cur?titleLetter(S.cur):'♪'; $('#ptitle').textContent=S.cur?S.cur.title:'Nothing playing'; $('#psub').textContent=S.cur?`${S.cur.artist} • ${S.cur.album}`:'Choose a song to start playback'; $('#shuffleBtn').textContent=`Shuffle ${S.shuffle?'On':'Off'}`; $('#repeatBtn').textContent=S.repeat==='off'?'Repeat Off':S.repeat==='all'?'Repeat All':'Repeat One'; $('#shuffleBtn').classList.toggle('on',S.shuffle); $('#repeatBtn').classList.toggle('on',S.repeat!=='off'); $('#playBtn').textContent=A.audio.paused?'▶':'❚❚'; }
function render(){ renderSide(); let html=''; if(S.nav==='home'){ html=homeView(); } else { const arr=filtered(); const title=S.selected || (S.nav==='artists'?'Artists':S.nav==='playlists'?'Playlists':S.nav==='library'?'Library':'Songs'); html=`<div class="section"><div class="sectionHead"><div><div class="eyebrow">Offline local library</div><h2 style="font-size:40px;margin:0">${esc(title)}</h2></div><div class="sub">${arr.length} tracks</div></div></div>${listSection(title,arr,true)}`; }
 A.content.innerHTML=html; updatePlayer(); }
function setTrack(track, sourceList){ if(sourceList) S.sourceList=[...sourceList]; if(!S.sourceList.length) S.sourceList=[track]; S.cur=track; S.qi=Math.max(0,S.sourceList.findIndex(x=>x.id===track.id)); A.audio.src=track.stream_url; A.audio.play().catch(()=>{}); render(); }
function continueTrack(){ if(S.repeat==='one' && S.cur){ setTrack(S.cur,S.sourceList); return; } if(S.repeat==='all' && S.sourceList.length){ let i=S.shuffle?Math.floor(Math.random()*S.sourceList.length):(S.qi+1)%S.sourceList.length; setTrack(S.sourceList[i],S.sourceList); return; }
 if(S.sourceList.length){ const siblings=S.sourceList.filter(t=>t.id!==S.cur.id && t.primary_artist===S.cur.primary_artist); if(siblings.length){ const nxt=siblings[Math.floor(Math.random()*siblings.length)]; setTrack(nxt,S.sourceList); return; } }
 const all=S.tracks.filter(t=>t.id!==S.cur?.id); if(all.length){ const same=all.filter(t=>t.primary_artist===S.cur?.primary_artist); const pick=(same.length?same:all)[Math.floor(Math.random()*((same.length?same:all).length))]; setTrack(pick, same.length?same:all); } }
function queueInsert(mode, items){ if(!items.length) return; if(mode==='replace'){ S.sourceList=[...items]; if(S.shuffle){ const first=items[Math.floor(Math.random()*items.length)]; setTrack(first, items); } else setTrack(items[0], items); return; }
 if(!S.sourceList.length){ S.sourceList=[...items]; return; }
 const idx=Math.max(0,S.qi+1); S.sourceList.splice(idx,0,...items); }
function openMenu(id,rect){ const m=$('#menu'); S.menuId=id; m.style.left=`${Math.min(window.innerWidth-240,Math.max(8,rect.left))}px`; m.style.top=`${Math.min(window.innerHeight-260,Math.max(8,rect.bottom+6))}px`; m.classList.add('open'); }
function closeMenu(){ $('#menu').classList.remove('open'); S.menuId=null; }
async function load(){ const d=await api('/api/library'); S.tracks=d.tracks||[]; S.playlists=d.playlists||[]; S.artistPlaylists=d.artist_playlists||[]; S.stats=d.stats||{}; render(); }
async function smartArtists(){ const d=await api('/api/playlists/generate-artists',{method:'POST'}); alert(d.message||'Done'); await load(); S.nav='artists'; render(); }
async function saveQueue(){ const ids=S.sourceList.map(t=>t.id); if(!ids.length) return; const name=prompt('Playlist name'); if(!name) return; await api('/api/playlists',{method:'POST',body:JSON.stringify({name,tracks:ids})}); await load(); S.nav='playlists'; render(); }
async function newPlaylistFromSelection(){ const ids=$$('.cb:checked').map(x=>x.closest('.row')?.dataset.play).filter(Boolean); const name=prompt('Playlist name'); if(!name) return; await api('/api/playlists',{method:'POST',body:JSON.stringify({name,tracks:ids})}); await load(); S.nav='playlists'; render(); }
function closeDrawer(){ $('#drawer').classList.remove('open'); $('#drawerBack').classList.remove('open'); }
function openDrawer(){ $('#drawer').classList.add('open'); $('#drawerBack').classList.add('open'); }
function setNav(nav){ S.nav=nav; S.selected=''; $$('.navBtn').forEach(b=>b.classList.toggle('active',(b.dataset.nav||b.dataset.dnav)===nav)); closeDrawer(); render(); }
function toggleSpeed(id){ const set=new Set(S.speedDials); if(set.has(id)) set.delete(id); else set.add(id); S.speedDials=[...set]; localStorage.setItem('music_player_speed_dials', JSON.stringify(S.speedDials)); render(); }
A.search.oninput=e=>{ S.query=e.target.value; A.sideSearch.value=S.query; A.drawerSearch.value=S.query; render(); }; A.sideSearch.oninput=e=>{ S.query=e.target.value; A.search.value=S.query; A.drawerSearch.value=S.query; render(); }; A.drawerSearch.oninput=e=>{ S.query=e.target.value; A.search.value=S.query; A.sideSearch.value=S.query; render(); };
$('#rescanBtn').onclick=load; $('#smartBtn').onclick=smartArtists; $('#saveQueueBtn').onclick=saveQueue; $('#saveQueueBtn2').onclick=saveQueue; $('#newPlaylistSide').onclick=newPlaylistFromSelection; $('#newPlaylistDrawer').onclick=newPlaylistFromSelection;
$('#openDrawer').onclick=openDrawer; $('#closeDrawer').onclick=closeDrawer; $('#drawerBack').onclick=closeDrawer;
$('#shuffleBtn').onclick=()=>{S.shuffle=!S.shuffle; updatePlayer();}; $('#repeatBtn').onclick=()=>{ S.repeat=S.repeat==='off'?'all':S.repeat==='all'?'one':'off'; updatePlayer(); }; $('#prevBtn').onclick=()=>{ if(S.sourceList.length){ const i=Math.max(0,S.qi-1); setTrack(S.sourceList[i],S.sourceList); } }; $('#nextBtn').onclick=continueTrack; $('#playBtn').onclick=()=>{ if(!S.cur){ const arr=filtered(); if(arr.length) setTrack(arr[0],arr); return; } if(A.audio.paused) A.audio.play(); else A.audio.pause(); }; $('#muteBtn').onclick=()=>{ A.audio.muted=!A.audio.muted; $('#muteBtn').textContent=A.audio.muted?'Unmute':'Mute';}; $('#clearQueueBtn').onclick=()=>{ S.sourceList=[]; S.qi=0; }; A.vol.oninput=()=>{ A.audio.volume=Number(A.vol.value); }; A.seek.oninput=()=>{ if(A.audio.duration) A.audio.currentTime=(Number(A.seek.value)/100)*A.audio.duration; };
A.audio.addEventListener('timeupdate',()=>{ $('#ctime').textContent=fmt(A.audio.currentTime); $('#ttime').textContent=fmt(A.audio.duration||S.cur?.duration||0); A.seek.value=A.audio.duration?((A.audio.currentTime/A.audio.duration)*100):0;}); A.audio.addEventListener('play',updatePlayer); A.audio.addEventListener('pause',updatePlayer); A.audio.addEventListener('ended',continueTrack);
document.addEventListener('click', async e=>{ const stop=e.target.closest('[data-stop]'); if(stop) return; const menuBtn=e.target.closest('[data-menu]'); if(menuBtn){ e.stopPropagation(); const same=S.menuId===menuBtn.dataset.menu && $('#menu').classList.contains('open'); if(same){ closeMenu(); return; } openMenu(menuBtn.dataset.menu, menuBtn.getBoundingClientRect()); return; }
 if($('#menu').classList.contains('open') && !e.target.closest('#menu')){ closeMenu(); return; }
 const nav=e.target.closest('[data-nav]'); const dnav=e.target.closest('[data-dnav]'); const pick=e.target.closest('[data-pick]'); const open=e.target.closest('[data-open]'); const cardPlay=e.target.closest('[data-playcard]'); const row=e.target.closest('.row'); const shuffleAll=e.target.closest('[data-shuffleall]'); const addAll=e.target.closest('[data-addall]'); const nextAll=e.target.closest('[data-nextall]');
 if(nav||dnav){ setNav((nav||dnav).dataset.nav||(nav||dnav).dataset.dnav); return; }
 if(pick){ S.selected=pick.dataset.pick; render(); closeDrawer(); return; }
 if(open){ S.nav=open.dataset.kind==='playlists'?'playlists':'artists'; S.selected=open.dataset.open; render(); return; }
 if(cardPlay){ const t=S.tracks.find(x=>x.id===cardPlay.dataset.playcard); if(t) setTrack(t,[t,...S.tracks.filter(x=>x.id!==t.id)]); return; }
 if(shuffleAll){ const arr=filtered(); if(arr.length){ S.shuffle=true; const pick=arr[Math.floor(Math.random()*arr.length)]; setTrack(pick,arr); updatePlayer(); } return; }
 if(addAll){ queueInsert('append', filtered()); return; }
 if(nextAll){ queueInsert('next', filtered()); return; }
 if(row){ const t=S.tracks.find(x=>x.id===row.dataset.play); if(t) setTrack(t,filtered()); return; }
});
$('#menu').addEventListener('click', async e=>{ const btn=e.target.closest('button[data-action]'); if(!btn || !S.menuId) return; const t=S.tracks.find(x=>x.id===S.menuId); if(!t) return; const act=btn.dataset.action; if(act==='playnext') queueInsert('next',[t]); if(act==='addqueue') queueInsert('append',[t]); if(act==='addplaylist'){ const name=prompt('Add to playlist'); if(name){ await api('/api/playlists/append',{method:'POST',body:JSON.stringify({name,tracks:[t.id]})}); await load(); } } if(act==='newplaylist'){ const name=prompt('Playlist name'); if(name){ await api('/api/playlists',{method:'POST',body:JSON.stringify({name,tracks:[t.id]})}); await load(); } } if(act==='speed'){ toggleSpeed(t.id); } closeMenu(); });
load();
</script>
</body>
</html>
