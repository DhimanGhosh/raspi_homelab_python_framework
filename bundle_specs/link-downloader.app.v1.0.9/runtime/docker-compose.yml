services:
  link-downloader:
    build: .
    container_name: link-downloader
    restart: unless-stopped
    ports:
      - "127.0.0.1:8160:8160"
    environment:
      APP_DATA_DIR: /data
      DOWNLOAD_ROOT: /data/downloads
      YTDLP_CACHE_DIR: /data/cache/yt-dlp
      DEFAULT_EXTERNAL_SAVE_DIR: /mnt/nas/media/music
      ALLOWED_SAVE_ROOTS: /mnt/nas:/data
      PYTHONUNBUFFERED: "1"
      HOST_DOWNLOAD_ROOT: /mnt/nas/homelab/runtime/link-downloader/data/downloads
    volumes:
      - /mnt/nas/homelab/runtime/link-downloader/data:/data
      - /mnt/nas:/mnt/nas
