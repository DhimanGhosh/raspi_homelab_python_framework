services:
  music-player:
    build: .
    container_name: homelab-music-player
    restart: unless-stopped
    network_mode: host
    environment:
      MUSIC_ROOT: /mnt/nas/media/music
      APP_DATA_DIR: /mnt/nas/homelab/runtime/music-player/data
    volumes:
      - /mnt/nas/media/music:/mnt/nas/media/music:ro
      - /mnt/nas/homelab/runtime/music-player/data:/mnt/nas/homelab/runtime/music-player/data
      - /etc/localtime:/etc/localtime:ro
