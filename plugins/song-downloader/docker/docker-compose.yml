services:
  song-downloader:
    build: .
    container_name: song-downloader
    environment:
      PORT: "8145"
      APP_NAME: "Song Downloader"
      APP_VERSION: "1.3.2"
      MUSIC_ROOT: "/mnt/nas/media/music"
      APP_DATA_DIR: "/mnt/nas/homelab/runtime/song-downloader/data"
      DOWNLOADS_DIR: "/mnt/nas/homelab/runtime/song-downloader/downloads"
    ports:
      - "127.0.0.1:8145:8145"
    volumes:
      - /mnt/nas/media/music:/mnt/nas/media/music
      - /mnt/nas/homelab/runtime/song-downloader/data:/mnt/nas/homelab/runtime/song-downloader/data
      - /mnt/nas/homelab/runtime/song-downloader/downloads:/mnt/nas/homelab/runtime/song-downloader/downloads
    restart: unless-stopped
