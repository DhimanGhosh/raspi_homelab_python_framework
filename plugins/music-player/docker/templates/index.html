<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Player</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <div id="mobileOverlay" class="mobile-overlay hidden"></div>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="brand-header">
        <div>
          <div class="brand-title">Music Player</div>
          <div id="brandVersion" class="brand-version">v7.2.1</div>
        </div>
        <button id="closeSidebarBtn" class="icon-btn sidebar-close">✕</button>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-btn active" data-view="all">All Songs</button>
        <button class="nav-btn" data-view="playlists">Playlists</button>
        <button class="nav-btn" data-view="artists">Artists</button>
        <button class="nav-btn" data-view="albums">Albums</button>
        <button class="nav-btn" data-view="folders">Folders</button>
      </nav>
      <div id="currentContext" class="current-context hidden"></div>
      <div class="sidebar-section">
        <div class="sidebar-label">Saved playlists</div>
        <div id="savedPlaylists" class="saved-playlists"></div>
      </div>
    </aside>

    <main class="main-panel">
      <header class="topbar" id="topbar">
        <div class="topbar-left">
          <button id="menuToggle" class="icon-btn menu-toggle">☰</button>
          <div class="search-wrap">
            <input id="searchInput" class="search-input" placeholder="Search songs, artists, albums, folders" />
            <button id="clearSearchBtn" class="clear-search-btn hidden">×</button>
          </div>
        </div>
        <div class="topbar-actions">
          <button id="shuffleAllBtn" class="ghost-btn">Shuffle all</button>
          <button id="refreshBtn" class="ghost-btn">Refresh</button>
        </div>
      </header>

      <section id="selectionBar" class="selection-bar hidden">
        <div id="selectedCount" class="selected-count">0 selected</div>
        <div class="selection-actions">
          <button id="addToPlaylistBtn" class="primary-btn" disabled>Add to playlist</button>
          <button id="addToFolderBtn" class="ghost-btn" disabled>Add to folder</button>
          <button id="clearSelectionBtn" class="ghost-btn" disabled>Clear selection</button>
        </div>
      </section>

      <section class="content-card">
        <div class="content-head">
          <div>
            <h2 id="contentTitle">All Songs</h2>
            <div id="contentMeta" class="content-meta"></div>
          </div>
          <div id="contextActions"></div>
        </div>
        <div id="tracksContainer" class="tracks-container"></div>
      </section>
    </main>
  </div>

  <footer class="player-bar" id="playerBar">
    <div class="player-art-wrap">
      <img id="nowArt" class="now-art hidden" alt="Album art" />
      <div id="nowArtFallback" class="now-art-fallback">♪</div>
    </div>
    <div class="now-playing">
      <div id="nowTitle" class="now-title">Nothing playing</div>
      <div id="nowArtist" class="now-artist">Select a track</div>
      <div id="nowSource" class="now-source">Source: —</div>
      <div id="nowAlbum" class="now-album">Album: Unknown</div>
      <div id="lyricsBox" class="lyrics-box">Lyrics will appear here when available.</div>
    </div>
    <div class="player-controls">
      <div class="control-row">
        <button id="prevBtn" class="icon-btn">⏮</button>
        <button id="playPauseBtn" class="icon-btn">▶</button>
        <button id="nextBtn" class="icon-btn">⏭</button>
        <button id="shuffleToggleBtn" class="icon-btn">🔀</button>
        <button id="repeatToggleBtn" class="icon-btn">Off</button>
      </div>
      <div class="seek-row">
        <span id="currentTime">0:00</span>
        <input id="seekBar" type="range" min="0" max="100" value="0" />
        <span id="totalTime">0:00</span>
      </div>
      <div id="queueInfo" class="queue-info">Queue: 0 song(s)</div>
    </div>
  </footer>

  <audio id="audioPlayer" preload="metadata"></audio>

  <div id="playlistModal" class="modal hidden">
    <div class="modal-backdrop" data-close="playlist"></div>
    <div class="modal-dialog">
      <div class="modal-head"><h3>Add to playlist</h3><button id="closePlaylistModalBtn" class="close-btn">×</button></div>
      <div class="modal-body">
        <div id="selectedSongsPreview" class="muted-label"></div>
        <div id="playlistList" class="playlist-list"></div>
        <div class="new-playlist-row">
          <input id="newPlaylistName" class="search-input" placeholder="New playlist name" />
          <button id="createPlaylistBtn" class="primary-btn">Create + add</button>
        </div>
      </div>
    </div>
  </div>

  <div id="folderModal" class="modal hidden">
    <div class="modal-backdrop" data-close="folder"></div>
    <div class="modal-dialog">
      <div class="modal-head"><h3>Add to folder</h3><button id="closeFolderModalBtn" class="close-btn">×</button></div>
      <div class="modal-body">
        <div id="folderList" class="playlist-list"></div>
        <div class="new-playlist-row">
          <input id="newFolderName" class="search-input" placeholder="New folder name" />
          <button id="createFolderBtn" class="primary-btn">Create + add</button>
        </div>
      </div>
    </div>
  </div>

  <div id="trackMenu" class="track-menu hidden"></div>

  <script src="/static/js/script.js" defer></script>
</body>
</html>
