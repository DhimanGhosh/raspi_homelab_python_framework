<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Player</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <div class="brand-title">Music Player</div>
        <div class="brand-version">v7.1.6</div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn active" data-view="all">All Songs</button>
        <button class="nav-btn" data-view="playlists">Playlists</button>
        <button class="nav-btn" data-view="artists">Artists</button>
        <button class="nav-btn" data-view="folders">Folders</button>
      </nav>

      <div class="sidebar-section">
        <div class="sidebar-label">Saved playlists</div>
        <div id="savedPlaylists" class="saved-playlists"></div>
      </div>
    </aside>

    <main class="main-panel">
      <header class="topbar">
        <input id="searchInput" class="search-input" placeholder="Search songs, artists, folders" />
        <div class="topbar-actions">
          <button id="shuffleAllBtn" class="ghost-btn">Shuffle all</button>
          <button id="refreshBtn" class="ghost-btn">Refresh</button>
        </div>
      </header>

      <section class="selection-bar">
        <div id="selectedCount" class="selected-count">0 selected</div>
        <div class="selection-actions hidden">
          <button id="addToPlaylistBtn" class="primary-btn" disabled>Add to playlist</button>
          <button id="addToFolderBtn" class="ghost-btn" disabled>Add to folder</button>
          <button id="clearSelectionBtn" class="ghost-btn" disabled>Clear selection</button>
        </div>
      </section>

      <section class="content-card">
        <div class="content-head">
          <h2 id="contentTitle">All Songs</h2>
          <div id="contentMeta" class="content-meta"></div>
        </div>
        <div id="tracksContainer" class="tracks-container"></div>
      </section>
    </main>
  </div>

  <footer class="player-bar">
    <div class="now-playing">
      <div id="nowTitle" class="now-title">Nothing playing</div>
      <div id="nowArtist" class="now-artist">Select a track</div>
    </div>

    <div class="player-controls">
      <div class="control-row">
        <button id="prevBtn" class="icon-btn">⏮</button>
        <button id="playPauseBtn" class="icon-btn">▶</button>
        <button id="nextBtn" class="icon-btn">⏭</button>
        <button id="shuffleToggleBtn" class="icon-btn">🔀</button>
        <button id="repeatToggleBtn" class="icon-btn">Off</button>
      </div>
      <div class="seek-row">
        <span id="currentTime">0:00</span>
        <input id="seekBar" type="range" min="0" max="100" value="0" />
        <span id="totalTime">0:00</span>
      </div>
    </div>
  </footer>

  <audio id="audioPlayer" preload="metadata"></audio>

  <div id="playlistModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close="playlist"></div>
    <div class="modal-dialog">
      <div class="modal-head">
        <h3>Add to playlist</h3>
        <button id="closePlaylistModalBtn" class="close-btn">×</button>
      </div>
      <div class="modal-body">
        <div id="lastPlaylistBlock" class="last-playlist-block hidden">
          <div class="muted-label">Last added to</div>
          <button id="lastPlaylistBtn" class="playlist-chip"></button>
        </div>
        <div class="muted-label">Existing playlists</div>
        <div id="playlistList" class="playlist-list"></div>
        <div class="muted-label">Create a new playlist</div>
        <div class="new-playlist-row">
          <input id="newPlaylistName" class="search-input" placeholder="New playlist name" />
          <button id="createPlaylistBtn" class="primary-btn">Create + add</button>
        </div>
      </div>
    </div>
  </div>

  <div id="folderModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close="folder"></div>
    <div class="modal-dialog">
      <div class="modal-head">
        <h3>Add to folder</h3>
        <button id="closeFolderModalBtn" class="close-btn">×</button>
      </div>
      <div class="modal-body">
        <div class="muted-label">Existing folders</div>
        <div id="folderList" class="playlist-list"></div>
        <div class="muted-label">Create a new folder</div>
        <div class="new-playlist-row">
          <input id="newFolderName" class="search-input" placeholder="New folder name" />
          <button id="createFolderBtn" class="primary-btn">Create + add</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/script.js" defer></script>
</body>
</html>
