services:
  music-player:
    build: .
    container_name: music-player
    environment:
      PORT: "8140"
      APP_NAME: "Music Player"
      APP_VERSION: "7.2.1"
      MUSIC_ROOT: "/mnt/nas/media/music"
      APP_DATA_DIR: "/mnt/nas/homelab/runtime/music-player/data"
    ports:
      - "127.0.0.1:8140:8140"
    volumes:
      - /mnt/nas/media/music:/mnt/nas/media/music
      - /mnt/nas/homelab/runtime/music-player/data:/mnt/nas/homelab/runtime/music-player/data
    restart: unless-stopped
