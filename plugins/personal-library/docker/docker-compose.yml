services:
  personal-library:
    build: .
    container_name: personal-library
    restart: unless-stopped
    ports:
      - "127.0.0.1:8132:8132"
    environment:
      APP_NAME: "Personal Library"
      APP_VERSION: "1.3.3"
    volumes:
      - /mnt/nas/homelab/runtime/personal-library/data:/opt/personal-library/data
