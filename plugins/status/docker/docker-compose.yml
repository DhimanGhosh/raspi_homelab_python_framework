services:
  status:
    build: .
    container_name: pi-statusboard
    restart: unless-stopped
    network_mode: host
    environment:
      APP_NAME: Pi Status Board
      APP_VERSION: 1.3.0
      TAILSCALE_FQDN: ${TAILSCALE_FQDN:-pi-nas.taild4713b.ts.net}
      NAS_PATH: /mnt/nas
      CONTROL_CENTER_SUMMARY_URL: ${CONTROL_CENTER_SUMMARY_URL:-http://127.0.0.1:9000/api/control-center/summary}
    volumes:
      - /mnt/nas:/mnt/nas
      - /etc/hostname:/etc/hostname:ro
      - /etc/localtime:/etc/localtime:ro
