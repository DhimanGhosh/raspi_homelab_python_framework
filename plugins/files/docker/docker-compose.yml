services:
  files:
    image: filebrowser/filebrowser:latest
    pull_policy: always
    container_name: homelab-files
    restart: unless-stopped
    user: "0:0"
    command:
      - --noauth
      - --root
      - /srv
      - --database
      - /database/filebrowser.db
      - --port
      - "80"
      - --address
      - 0.0.0.0
      - --log
      - stdout
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - /mnt/nas:/srv
      - ./database:/database
