
services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    environment:
      TZ: Asia/Kolkata
      WEBPASSWORD: ${PIHOLE_PASSWORD:-admin}
      FTLCONF_dns_upstreams: 1.1.1.1;1.0.0.1
      FTLCONF_dns_listeningMode: all
      DNSMASQ_LISTENING: all
    ports:
      - '53:53/tcp'
      - '53:53/udp'
      - '127.0.0.1:8080:80'
    volumes:
      - /mnt/nas/homelab/runtime/pihole/data/etc-pihole:/etc/pihole
      - /mnt/nas/homelab/runtime/pihole/data/etc-dnsmasq.d:/etc/dnsmasq.d
    restart: unless-stopped
