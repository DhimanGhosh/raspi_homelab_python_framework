<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Homelab OS Control Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/css/control_center.css">
</head>
<body>
    <div class="page">
        <header class="header">
            <div>
                <h1>Homelab OS Control Center</h1>
                <div id="summaryLine" class="subtext">Loading...</div>
            </div>
            <div class="header-actions">
                <button id="refreshBtn">Refresh</button>
            </div>
        </header>

        <section class="panel">
            <h2>Installed Plugins</h2>
            <div id="pluginsContainer" class="cards"></div>
        </section>

        <section class="panel">
            <h2>Jobs</h2>
            <div id="jobsContainer" class="jobs"></div>
        </section>

        <section class="panel">
            <h2>Selected Job Log</h2>
            <div class="job-log-toolbar">
                <div id="selectedJobLabel" class="subtext">No job selected</div>
                <button id="copyLogBtn">Copy Log</button>
            </div>
            <pre id="jobLogBox" class="job-log"></pre>
        </section>
    </div>

    <script src="/static/js/control_center.js"></script>
</body>
</html>
