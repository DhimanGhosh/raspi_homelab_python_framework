<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pi Control Center</title>
  <link rel="stylesheet" href="/static/css/control_center_full.css">
</head>

<body oncontextmenu="return false;">
  <div class="container">
    <header class="hero">
      <div>
        <h1>Pi Control Center</h1>
        <div class="muted">Control OS for your Pi-NAS</div>
      </div>
      <div class="hero-actions">
        <div class="search-wrap">
          <div class="search-input-wrap">
            <input id="appSearchInput" class="app-search-input" type="search" placeholder="Search apps..."
              autocomplete="off">
            <button id="clearAppSearchBtn" class="clear-input-btn secondary" type="button"
              aria-label="Clear search">✕</button>
          </div>
        </div>
        <div id="versionBadge" class="badge version-badge">v3</div>
        <button id="menuToggle" class="secondary icon-btn" aria-label="Open menu">☰</button>
      </div>
    </header>

    <div id="drawerBackdrop" class="drawer-backdrop hidden"></div>
    <aside id="menuDrawer" class="menu-drawer hidden">
      <div class="drawer-head">
        <h3>Menu</h3>
        <button id="closeMenuBtn" class="secondary">✕</button>
      </div>
      <div class="drawer-actions">
        <button id="menuNotificationsBtn">Notifications</button>
        <button id="menuRescanBtn" class="secondary">Rescan Marketplace</button>
        <button id="menuInstallAllBtn" class="secondary">Install All</button>
        <button id="menuUpdateAllBtn" class="secondary">Update All</button>
      </div>
    </aside>

    <section class="card storage">
      <h2>Storage</h2>
      <div class="grid3">
        <div class="metric"><span>NAS Usage</span><strong id="nasUsage">-</strong></div>
        <div class="metric"><span>Homelab Usage</span><strong id="homelabUsage">-</strong></div>
        <div class="metric"><span>Pi SD Card Storage</span><strong id="rootUsage">-</strong><small class="muted"
            id="dockerRoot">Docker root: -</small></div>
      </div>
    </section>

    <section class="card">
      <div class="row between">
        <h2>Install Queue</h2>
        <div class="queue-tools">
          <span class="muted">Live app install manager</span>
          <button id="clearCompletedBtn" class="secondary">Clear completed</button>
          <button id="clearAllBtn" class="secondary danger-soft">Clear all</button>
        </div>
      </div>
      <div id="jobsArea" class="job-grid"></div>
    </section>

    <section class="card" id="logCard" style="display:none">
      <div class="row between">
        <h2>Selected Job Log</h2>
        <div class="bundle-actions">
          <button id="copyLogBtn" class="secondary">Copy full log</button>
          <button id="clearLogBtn" class="secondary danger-soft">Clear log</button>
          <button id="hideLogBtn" class="secondary">Hide</button>
        </div>
      </div>
      <pre id="logBox" class="log-box"></pre>
    </section>

    <section class="card">
      <div class="row between">
        <h2>Apps, Installed Bundles & Marketplace</h2>
        <div class="muted">Uploaded bundles: <span id="bundleCount">0</span></div>
      </div>
      <div id="appsArea" class="cards"></div>
    </section>
  </div>

  <script src="/static/js/control_center_full.js"></script>
</body>

</html>
